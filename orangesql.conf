# ============================================
# OrangeSQL Configuration File
# ============================================

[server]
# Network settings
port = 5432
host = localhost
max_connections = 100
backlog_size = 128
socket_timeout_sec = 30

[memory]
# Memory settings
buffer_pool_size = 1024           # Number of pages in buffer pool (4KB each)
max_sort_memory = 64               # Memory for sorting operations (MB)
join_buffer_size = 32               # Memory for hash joins (MB)
temp_table_max_size = 100           # Max size for temp tables (MB)
max_memory_usage = 1024              # Max total memory usage (MB)

[storage]
# Storage settings
data_directory = data/tables
wal_directory = data/wal
system_directory = data/system
temp_directory = data/temp
max_file_size = 10240                # Max file size (MB)
max_open_files = 1000
sync_on_write = false
enable_compression = false

[transaction]
# Transaction settings
default_isolation = REPEATABLE_READ
lock_timeout_ms = 5000
deadlock_timeout_ms = 1000
transaction_timeout_sec = 300
max_transactions = 1000
enable_deadlock_detection = true

[logging]
# Logging settings
log_level = INFO                     # DEBUG, INFO, WARN, ERROR
log_file = logs/orangesql.log
log_slow_queries = true
slow_query_threshold_ms = 1000
log_all_queries = false
log_transactions = false
log_locks = false
max_log_size = 100                    # Max log file size (MB)

[checkpoint]
# Checkpoint settings
checkpoint_interval_sec = 300
checkpoint_log_size = 50               # Trigger checkpoint after (MB)
force_checkpoint_on_shutdown = true
incremental_checkpoint = false

[wal]
# WAL settings
wal_buffer_size = 1                    # WAL buffer size (MB)
wal_file_size = 100                     # Max WAL file size (MB)
wal_sync_interval_ms = 1000
wal_mode = NORMAL                       # NORMAL, ASYNC, NO_LOG

[query]
# Query settings
max_join_tables = 64
max_subquery_depth = 10
default_limit = 1000
max_limit = 1000000
enable_query_cache = true
query_cache_size = 1000
enable_result_cache = true
enable_prepared_statements = true

[optimizer]
# Optimizer settings
optimization_level = 2                   # 0-3
index_scan_cost = 1.0
seq_scan_cost = 10.0
index_selectivity_threshold = 0.2
statistics_target = 10000
histogram_buckets = 100
enable_parallel_query = true
parallel_workers = 4

[statistics]
# Statistics settings
auto_analyze = true
analyze_threshold = 10000
statistics_update_interval_hours = 24

[security]
# Security settings
require_authentication = false
password_encryption = sha256
max_login_attempts = 5
login_timeout_minutes = 30
session_timeout_minutes = 60

[backup]
# Backup settings
backup_directory = data/backup
auto_backup_enabled = true
auto_backup_interval_hours = 24
backup_retention_days = 30

[replication]
# Replication settings
enable_replication = false
replication_factor = 1
replication_sync_timeout_sec = 10

[performance]
# Performance tuning
use_jemalloc = false
use_uring = false
enable_async_io = false
io_threads = 4
cpu_cores = auto

[debug]
# Debug settings (if compiled with DEBUG)
debug_mode = false
log_slow_queries = true
log_slow_query_threshold_ms = 100
enable_assertions = true
enable_tracing = false

[feature_flags]
# Experimental features
enable_vectorized_execution = false
enable_adaptive_optimizer = false
enable_columnar_storage = false
enable_jsonb = false
enable_full_text_search = false

[custom]
# Custom settings (for extensions)
extension_directory = extensions
enable_user_defined_functions = false